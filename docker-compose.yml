services:
  backend:
    build: ./backend
    restart: always
    network_mode: host
    environment:
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
      FIREBASE_CREDENTIALS_FILE: /app/firebase_credentials.json
      JWT_SECRET: ${JWT_SECRET}
      GIN_MODE: ${GIN_MODE:-release}
      PORT: ${PORT:-8081}
      SNIFF_IFACE: ${SNIFF_IFACE:-}
    volumes:
      - ./backend/firebase_credentials.json:/app/firebase_credentials.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend